name: Frontend Build and Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Use npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        working-directory: nature-api

      - name: Write production secrets file
        run: |
          mkdir -p nature-api/src/environments
          cat > nature-api/src/environments/secret.env.ts <<'EOF'
          export const API_URL = "${{ secrets.PRODUCTION_API_URL }}";
          export const MAPBOX_TOKEN = "${{ secrets.MAPBOX_TOKEN }}";
          EOF

      - name: Build (production)
        run: npm run build -- --configuration production
        working-directory: nature-api

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: nature-api
          file: nature-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nature-api:latest
            ghcr.io/${{ github.repository_owner }}/nature-api:${{ github.sha }}
